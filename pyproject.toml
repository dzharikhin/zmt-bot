requests-ratelimiter = "^0.9.2"
path-dict = "^4.0.0"
soundfile = "^0.13.1"
atomics = "^1.0.2"
scikit-learn = "^1.8.0"
dacite = "^1.9.2"
telethon = "^1.42.0"
