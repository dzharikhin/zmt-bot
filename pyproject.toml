audioread = "^3.0.1"
standard-sunau = "^3.13.0"
poetry-core = "^2.3.1"
polars = "^1.38.1"
pyquery = "^2.0.1"
aiohttp = "^3.13.3"
aiohttp-cors = "^0.8.1"
pyod = "^2.0.7"
essentia = {path = "essentia/essentia-2.1b6.dev0-cp312-cp312-manylinux_2_35_x86_64.whl", develop = true}
